<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Bright Future Academy</title>
    <link rel="stylesheet" href="style5.css" />
    <style>
    *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f4f4;
}

/* Header */
header{
    background:#006366;
    color:white;
    padding:20px;
}

.main{
    width:90%;
    margin:auto;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo h2{
    font-size:32px;
}
.nav h2{
    color: #006366;
}

ul{
    display: flex;
    list-style: none;
    gap: 20px;
}

ul li a{
    text-decoration: none;
    color: white;
    font-weight: bold;
}

ul li a:hover{
    color: #b99bc5;
}
.container {
        width: 90%;
        margin: auto;
        padding: 50px 0;
      }

      .contact-box {
        display: flex;
        gap: 30px;
        flex-wrap: wrap;
      }

      .contact-info {
        flex: 1;
        background: #0a3d62;
        color: white;
        padding: 30px;
        border-radius: 15px;
      }

      .contact-form {
        flex: 1;
        background: white;
        padding: 30px;
        border-radius: 15px;
      }

      .contact-form form {
        display: flex;
        flex-direction: column;
        gap: 15px;
      }

      input,textarea {
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 10px;
        resize: none;
      }
      
footer{
    text-align: center;
    margin-top: 20px;
    color: black;
}
.location{
        text-align: center;
      }
      </style>
  </head>
  <body>
    <header>
      <div class="main">
        <div class="navbar">
          <h2>Bright Future Academy</h2>
        </div>
        <div>
          <ul>
            <li><a href="index.html">index</a></li>
            <li><a href="about.html">about</a></li>
            <li><a href="teachers.html">teachers</a></li>
            <li><a href="admission.html">admission</a></li>
            <li><a href="contact.html">contact</a></li>
          </ul>
        </div>
      </div>
    </header>
    <div class="container">
      <h1 style="text-align: center; color: #0a3d62; margin-bottom: 30px">
        Contact Us
      </h1>

      <div class="contact-box">
        <div class="contact-info">
          <h2>Get In Touch</h2>

          <br />

          <p>📍Mogadishu, Somalia</p>
          <p>📞 +252 61 1234567</p>
          <p>📧info@brightfutureacademy.com</p>
        </div>

        <div class="contact-form">
          <form>
            <input type="text" placeholder="Your Name" />

            <input type="email" placeholder="Your Email" />

            <textarea placeholder="Your Message"></textarea>

            <button>Send Message</button>
          </form>
        </div>
      </div>
    </div>
    <div class="location">
        <h1>see our location</h1>
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d8137198.635573569!2d40.99241546734331!3d5.2247063675532965!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x181d2ea7ecd15b83%3A0x9e393ace5ce9e5be!2sSomalia!5e0!3m2!1sen!2sso!4v1782925977730!5m2!1sen!2sso" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="strict-origin-when-cross-origin"></iframe>
    </div>
    <footer>
    <h3>copyright &copy; 2026 Bright future Academy</h3>
</footer>
  </body>
</html>
